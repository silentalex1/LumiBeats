<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidAI Studio • Professional AI Video Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050505] text-zinc-100 antialiased selection:bg-violet-500/30">
    <nav class="bg-[#050505]/80 backdrop-blur-xl border-b border-zinc-800/50 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-6">
            <div class="flex items-center gap-x-2.5 group cursor-pointer">
                <div class="w-8 h-8 bg-gradient-to-tr from-violet-600 to-fuchsia-500 rounded-lg flex items-center justify-center shadow-lg shadow-violet-500/20 group-hover:scale-105 transition-transform">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-400">VidAI</h1>
            </div>
            <div class="hidden md:flex items-center gap-x-6 text-[13px] font-medium text-zinc-400">
                <a href="#" onclick="showSection('editor')" class="hover:text-white transition-colors">Editor</a>
                <a href="#" class="hover:text-white transition-colors">Projects</a>
                <a href="#" class="hover:text-white transition-colors">Assets</a>
                <a href="#" class="hover:text-white transition-colors">Stock</a>
            </div>
        </div>
        <div class="flex items-center gap-x-3">
            <div class="px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-full text-[11px] font-mono text-emerald-400 flex items-center gap-x-2">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                VidAI Engine v6.0
            </div>
            <div class="w-8 h-8 bg-zinc-800 rounded-full flex items-center justify-center cursor-pointer border border-zinc-700">
                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
        </div>
    </nav>

    <div id="upload-screen" class="min-h-[calc(100vh-64px)] flex items-center justify-center p-6">
        <div onclick="triggerUpload()" class="group relative w-full max-w-2xl aspect-[16/10] bg-zinc-900/30 border border-zinc-800 rounded-3xl flex flex-col items-center justify-center hover:bg-zinc-900/50 hover:border-violet-500/50 transition-all cursor-pointer">
            <div class="w-16 h-16 bg-zinc-800 rounded-2xl flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
            </div>
            <h2 class="text-3xl font-semibold tracking-tight mb-2">Import Project Media</h2>
            <p class="text-zinc-500 mb-8">Drop files here to begin AI generation</p>
            <input type="file" id="fileInput" accept="video/*" class="hidden" onchange="handleFile(this)">
        </div>
    </div>

    <div id="editor-screen" class="hidden h-[calc(100vh-64px)] grid-cols-[260px_1fr_320px]">
        <aside class="bg-[#080808] border-r border-zinc-800/50 flex flex-col">
            <div class="p-4 flex items-center justify-between border-b border-zinc-800/30">
                <h3 class="text-[11px] font-bold uppercase tracking-widest text-zinc-500">History</h3>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                <div onclick="loadDemoVideo()" class="bg-zinc-900/50 border border-zinc-800/50 rounded-xl p-3 cursor-pointer">
                    <div class="w-full aspect-video bg-zinc-800 rounded-lg mb-2"></div>
                    <p class="text-[10px] font-medium text-zinc-400">Demo_Source.mp4</p>
                </div>
            </div>
        </aside>

        <main class="flex flex-col bg-[#050505]">
            <header class="h-14 px-6 border-b border-zinc-800/50 flex items-center justify-between bg-[#080808]">
                <div class="flex items-center gap-x-4">
                    <h2 id="video-title" class="text-sm font-medium">Untitled</h2>
                    <span id="video-duration" class="text-[11px] font-mono text-zinc-500 bg-zinc-900 px-2 py-0.5 rounded">00:00 / 00:00</span>
                    <div id="quality-badge" class="text-[9px] font-bold bg-violet-500/10 text-violet-400 px-2 py-0.5 rounded border border-violet-500/20">1080P</div>
                </div>
                <button onclick="exportVideo()" class="bg-violet-600 hover:bg-violet-500 text-white px-5 py-1.5 rounded-full text-[13px] font-semibold transition-all">
                    Export
                </button>
            </header>

            <div class="flex-1 flex items-center justify-center p-8 relative">
                <div class="relative w-full max-w-[90%] aspect-video bg-black rounded-2xl shadow-2xl overflow-hidden border border-zinc-800/50">
                    <video id="preview" class="w-full h-full object-contain" controls></video>
                    <div id="ai-overlay" class="hidden absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center">
                        <div class="text-emerald-400 font-bold tracking-tighter text-2xl animate-pulse">CHANGES APPLIED</div>
                    </div>
                </div>
            </div>

            <footer class="bg-[#080808] border-t border-zinc-800/50 p-6">
                <div id="timeline" class="h-16 bg-zinc-900/50 border border-zinc-800 rounded-xl relative cursor-crosshair" onclick="scrubTimeline(event)">
                    <div id="playhead" class="absolute top-0 bottom-0 w-0.5 bg-violet-500 z-10"></div>
                </div>
            </footer>
        </main>

        <aside class="bg-[#080808] border-l border-zinc-800/50 flex flex-col">
            <div class="flex border-b border-zinc-800/50">
                <button onclick="switchTab(0)" id="tab-0" class="flex-1 py-4 text-[10px] font-bold uppercase tracking-widest border-b border-violet-500">AI Studio</button>
                <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500">Settings</button>
            </div>

            <div class="p-5 flex-1 flex flex-col">
                <div id="ai-panel" class="space-y-6">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="runAITool('upscale')" class="tool-btn">UPSCALE</button>
                        <button onclick="runAITool('shake')" class="tool-btn">SHAKE</button>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex-1">
                        <h4 class="text-[10px] font-bold text-zinc-500 mb-3 uppercase">Command VidAI</h4>
                        <textarea id="ai-prompt" rows="6" class="w-full bg-transparent border-none outline-none resize-none text-[13px] text-zinc-200 placeholder:text-zinc-700" placeholder="e.g. 'Add a camera shake effect and upscale to 4080p quality'"></textarea>
                        <button onclick="runCustomAI()" class="mt-4 w-full bg-white text-black py-3 rounded-xl font-bold text-[12px] hover:bg-violet-400 transition-colors">GENERATE WITH VIDAI</button>
                    </div>
                </div>
                <div id="manual-panel" class="hidden">
                    <p class="text-zinc-500 text-xs">Project settings and manual adjustments</p>
                </div>
            </div>
        </aside>
    </div>

    <div id="loading-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-violet-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <h3 id="loading-text" class="text-2xl font-bold text-white tracking-tight">VidAI is cooking up..</h3>
            <p class="text-zinc-500 mt-2 text-sm font-mono">Synthesizing Neural Layers</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
